<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn {
      background: #22c55e;
      width: 100%;
    }

    .delete {
      background: #ef4444;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }

    th {
      background: #020617;
    }

    tr:hover {
      background: #1e293b;
    }

    #loader {
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>

<div class="card" id="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="pass" placeholder="Enter Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<div class="card" id="panel" style="display:none;">

  <h2>📊 Student Records</h2>

  <input type="text" id="search" placeholder="Search Name / ID..." onkeyup="filter()">

  <div id="loader">⏳ Loading...</div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Class</th>
        <th>Sec</th>
        <th>Roll</th>
        <th>ID</th>
        <th>DOB</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxxHW11dIzfA2Px8wS2lMkObShvz3CD1CHGbFSzuESlyfG3RrfP0y2aZePtqDlulpYxsA/exec";
const ADMIN_PASS = "8851199376";

// LOGIN
function login(){
  let pass = document.getElementById("pass").value;

  if(pass === ADMIN_PASS){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    loadData();
  } else {
    alert("❌ Wrong Password");
  }
}


// LOAD DATA (better UX)
function loadData(){
  document.getElementById("loader").style.display = "block";

  fetch(scriptURL + "?admin=true")
  .then(res => res.json())
  .then(data => {

    let tbody = document.getElementById("data");
    tbody.innerHTML = "";

    for(let i = 1; i < data.length; i++){
      let row = data[i];

      tbody.innerHTML += `
        <tr>
          <td>${row[0]}</td>
          <td>${row[1]}</td>
          <td>${row[2]}</td>
          <td>${row[3]}</td>
          <td>${row[4]}</td>
          <td>${row[5]}</td>
          <td>
            <button class="delete" onclick="del('${row[4]}')">Delete</button>
          </td>
        </tr>
      `;
    }

    document.getElementById("loader").style.display = "none";
  })
  .catch(() => {
    document.getElementById("loader").innerText = "❌ Failed to load";
  });
}


// DELETE (smooth)
function del(id){
  if(!confirm("Delete this entry?")) return;

  fetch(scriptURL, {
    method: "POST",
    body: new URLSearchParams({ delete_id: id })
  })
  .then(res => res.text())
  .then(msg => {
    alert("✅ Deleted");
    loadData();
  });
}


// SEARCH FILTER (smooth)
function filter(){
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("#data tr");

  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
  });
}

</script>

</body>
</html>
